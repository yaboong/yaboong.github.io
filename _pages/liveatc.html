<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveATC MP3 Silence Remover</title>
    <script src="/assets/ffmpeg/ffmpeg.min.js"></script>
    <script src="/js/liveatc.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        #drop-area {
            border: 2px dashed #aaa;
            padding: 20px;
            text-align: center;
            margin: 20px auto;
            width: 70%;
            cursor: pointer;
            border-radius: 10px;
            color: #333;
            font-size: 18px;
            font-weight: bold;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #drop-area p {
            margin-bottom: 5px;
        }
        #file-list {
            list-style: none;
            padding: 0;
            margin-top: 10px;
            width: 100%;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f9fd;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            font-size: 14px;
            width: 90%;
        }
        .progress-bar {
            width: 100px;
            height: 6px;
            background: #555;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar span {
            display: block;
            height: 100%;
            width: 0;
            background: #63b3ed;
            transition: width 0.4s ease;
        }
        #file-input {
            display: none;
        }
        #file-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
        }
        #file-label, #process-button {
            display: inline-block;
            padding: 10px 20px;
            background: #63b3ed;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        #file-label:hover, #process-button:hover {
            background: #4299e1;
        }
        #process-button {
            display: none;
        }
        #loading-indicator {
            display: none;
            font-size: 16px;
            font-weight: bold;
            color: #63b3ed;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
        .button {
            padding: 8px 16px;
            background: #63b3ed;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .button:hover {
            background: #4299e1;
        }
    </style>
</head>
<body>
<h2>LiveATC MP3 Processor</h2>
<div id="drop-area">
    <p>Drag & Drop MP3 files here</p>
    <ul id="file-list"></ul>
    <div id="file-controls">
        <label for="file-input" id="file-label">Choose Files</label>
        <input type="file" id="file-input" multiple accept="audio/mpeg">
        <button id="process-button">Silence Remove</button>
    </div>
</div>
<p id="loading-indicator">Processing...</p>
<div id="control-buttons">
    <button id="download-all-button" class="button hidden">Download All</button>
</div>
</body>
</html>
